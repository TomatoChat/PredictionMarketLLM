service_slug: polymarket
service_name: polymarket
is_public: true

memory: 256
cpu: 1
min_instances: 0
max_instances: 1
concurrency: 80
# must stay >= dispatch deadline of scrape-markets-polymarket
# (single source of truth: backend/tasks/QUEUE_DISPATCH_DEADLINES.py)
timeout: 180

needs_cloudsql: true

environment_variables:
  TASK_RUNNER_SA_EMAIL: task-runner@prediction-market-llm.iam.gserviceaccount.com
  POLYMARKET_SERVICE_URL: https://polymarket-855896249283.europe-west3.run.app
  LLM_SERVICE_URL: https://llm-855896249283.europe-west3.run.app
  GCS_RAW_BUCKET: prediction-market-llm-raw

startup_probe_path: /ready
startup_probe_initial_delay: 0
startup_probe_timeout: 1
startup_probe_period: 5
startup_probe_failure_threshold: 20

health_check_path: /health
health_check_timeout: 1
health_check_interval: 10
health_check_failure_threshold: 3
