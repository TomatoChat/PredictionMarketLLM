exclude = '^CLAUDE\.md$'

[[repos]]
repo = "builtin"
hooks = [
    { id = "trailing-whitespace" },
    { id = "end-of-file-fixer" },
    { id = "check-yaml" },
    { id = "check-added-large-files" },
]

[[repos]]
repo = "https://github.com/astral-sh/ruff-pre-commit"
rev = "v0.15.14"
hooks = [
    { id = "ruff", args = ["--fix", "--show-fixes"] },
    { id = "ruff-format" },
]

[[repos]]
repo = "local"
hooks = [
    { id = "ty-check", name = "ty type check", entry = "uv run ty check", language = "system", pass_filenames = false, types = ["python"] },
]
