name: Scrape Markets

on:
  schedule:
    - cron: "0 0,1,4,5,8,9,12,13,16,17,20,21 * * *"
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to run against"
        required: true
        type: choice
        options:
          - prd
          - stg
        default: stg
      polymarket:
        description: "Scrape Polymarket"
        required: false
        type: boolean
        default: true

jobs:
  polymarket:
    if: ${{ github.event_name == 'schedule' || inputs.polymarket }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'prd' }}
    env:
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      DB_HOST: ${{ secrets.DB_HOST }}
      DB_PORT: ${{ secrets.DB_PORT }}
      DB_NAME: ${{ secrets.DB_NAME }}
    steps:
      - name: Reject prd from non-main branch
        if: github.event_name == 'workflow_dispatch' && inputs.environment == 'prd' && github.ref != 'refs/heads/main'
        run: |
          echo "::error::prd can only run from main; current ref is ${{ github.ref }}"
          exit 1

      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run scrape_polymarket
        run: uv run python -c "import sys; from backend.crons.scrape_markets.helpers import scrape_polymarket; sys.exit(0 if scrape_polymarket() else 1)"
