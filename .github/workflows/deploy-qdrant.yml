name: Deploy Qdrant

# Qdrant lives outside GCP, so it gets its own workflow rather than riding the
# GCP deploy (.github/workflows/deploy.yml). Two independent jobs:
#   • qdrant_sync     — reconcile collections (data plane) from backend/qdrant/schema.py
#   • qdrant_deployer — manage the Qdrant Cloud cluster (control plane) via Pulumi
#
# They have no `needs` between them: the cluster already exists, so collection
# sync must not be blocked by the cluster stack (which stays inert until the
# existing cluster is imported and QDRANT_CLOUD_API_KEY is set — see
# backend/infra/qdrant_deployer/README.md).

on:
  push:
    branches: [main]
    paths:
      - "backend/qdrant/**"
      - "backend/infra/qdrant_deployer/**"
      - "settings/**"
      - ".github/workflows/deploy-qdrant.yml"
  workflow_dispatch:

concurrency:
  group: deploy-qdrant-prd
  cancel-in-progress: false

jobs:
  qdrant_sync:
    name: Sync Qdrant collections
    runs-on: ubuntu-latest
    environment: prd
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS_JSON }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      # sqlalchemy is needed because the qdrant lib transitively imports the
      # db ORM (qdrant.models.MarketEmbeddingPoint uses db.Source).
      # No psycopg / DB connection is needed — sync only talks to Qdrant.
      - name: Install Qdrant client dependencies
        run: pip install qdrant-client pydantic pydantic-settings google-cloud-secret-manager sqlalchemy

      # Reconcile every collection declared in backend/qdrant/schema.py against the
      # cluster (create missing, reconcile payload indexes). Idempotent. Endpoint +
      # key come from Secret Manager (same secret ids the services read from GSM).
      - name: Sync collections
        run: |
          export QDRANT_ENDPOINT="$(gcloud secrets versions access latest --secret=QDRANT_ENDPOINT)"
          export QDRANT_API_KEY="$(gcloud secrets versions access latest --secret=QDRANT_API_KEY)"
          PYTHONPATH=backend python -m qdrant.sync

  qdrant_deployer:
    name: Deploy Qdrant Cloud cluster
    # PREREQUISITES (see backend/infra/qdrant_deployer/README.md): the existing
    # cluster must be `pulumi import`ed first or this creates a duplicate, and
    # QDRANT_CLOUD_API_KEY must be set as a repo secret.
    runs-on: ubuntu-latest
    environment: prd
    permissions:
      contents: read
      id-token: write
    env:
      PULUMI_BACKEND_URL: gs://prediction-market-llm-pulumi-state
      PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}
      QDRANT_CLOUD_API_KEY: ${{ secrets.QDRANT_CLOUD_API_KEY }}
    steps:
      - uses: actions/checkout@v6

      # GCP auth is for the Pulumi state bucket (gs://), not for Qdrant itself.
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS_JSON }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install deployer dependencies
        working-directory: backend/infra/qdrant_deployer
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r requirements.txt

      - name: Install Pulumi CLI
        uses: pulumi/actions@v7

      # Terraform-bridged provider: generate + install the pulumi_qdrant_cloud SDK.
      - name: Add Qdrant Cloud provider SDK
        working-directory: backend/infra/qdrant_deployer
        run: pulumi package add terraform-provider registry.terraform.io/qdrant/qdrant-cloud

      - name: Select or create the prd stack
        working-directory: backend/infra/qdrant_deployer
        run: pulumi stack select prd --create

      - name: Pulumi up
        working-directory: backend/infra/qdrant_deployer
        run: pulumi up --yes --refresh --stack prd
