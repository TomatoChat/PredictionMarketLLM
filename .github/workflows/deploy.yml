name: Deploy

# Single workflow that enforces the deploy ordering:
#   cloud_run_deployer  →  queue_deployer ∥ cron_deployer
#
# cloud_run_deployer must run first because:
#   • queue_deployer's `ServiceIamMember` bindings reference Cloud Run services
#     created by cloud_run_deployer.
#   • cron_deployer's `cloudrunv2.get_service_output(...)` looks up the
#     orchestrator service URL, which cloud_run_deployer creates.
#
# queue_deployer and cron_deployer are independent of each other, so they fan
# out and run in parallel once cloud_run_deployer succeeds.
#
# Qdrant is deployed separately (.github/workflows/deploy-qdrant.yml) — it lives
# outside GCP, so it doesn't ride this workflow.
#
# Every `pulumi up` is idempotent — if nothing in a stack changed, that job is
# a near-instant no-op.

on:
  push:
    branches: [main]
    paths:
      - "backend/apis/**"
      - "backend/crons/**"
      - "backend/queues/**"
      - "backend/embedder/**"
      - "backend/qdrant/**"
      - "backend/supabase/**"
      - "backend/tasks/**"
      - "settings/**"
      - "backend/infra/cloud_run_deployer/**"
      - "backend/infra/cron_deployer/**"
      - "backend/infra/queue_deployer/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

concurrency:
  group: deploy-prd
  cancel-in-progress: false

jobs:
  cloud_run_deployer:
    name: Deploy Cloud Run services
    runs-on: ubuntu-latest
    environment: prd
    permissions:
      contents: read
      id-token: write
    env:
      PULUMI_BACKEND_URL: gs://prediction-market-llm-pulumi-state
      PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}
    steps:
      - uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS_JSON }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker europe-west3-docker.pkg.dev --quiet

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install deployer dependencies
        working-directory: backend/infra/cloud_run_deployer
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r requirements.txt

      - name: Install Pulumi CLI
        uses: pulumi/actions@v7

      - name: Pulumi up
        working-directory: backend/infra/cloud_run_deployer
        run: pulumi up --yes --refresh --stack prd

  queue_deployer:
    name: Deploy Cloud Tasks queues
    needs: cloud_run_deployer
    runs-on: ubuntu-latest
    environment: prd
    permissions:
      contents: read
      id-token: write
    env:
      PULUMI_BACKEND_URL: gs://prediction-market-llm-pulumi-state
      PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}
    steps:
      - uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS_JSON }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install deployer dependencies
        working-directory: backend/infra/queue_deployer
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r requirements.txt

      - name: Install Pulumi CLI
        uses: pulumi/actions@v7

      - name: Pulumi up
        working-directory: backend/infra/queue_deployer
        run: pulumi up --yes --refresh --stack prd

  cron_deployer:
    name: Deploy Cloud Scheduler crons
    needs: cloud_run_deployer
    runs-on: ubuntu-latest
    environment: prd
    permissions:
      contents: read
      id-token: write
    env:
      PULUMI_BACKEND_URL: gs://prediction-market-llm-pulumi-state
      PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}
    steps:
      - uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS_JSON }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install deployer dependencies
        working-directory: backend/infra/cron_deployer
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r requirements.txt

      - name: Install Pulumi CLI
        uses: pulumi/actions@v7

      - name: Pulumi up
        working-directory: backend/infra/cron_deployer
        run: pulumi up --yes --refresh --stack prd

  seed_llm_configs:
    name: Seed LLM configs
    needs: cloud_run_deployer
    runs-on: ubuntu-latest
    environment: prd
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS_JSON }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Sync llm service deps
        working-directory: backend/apis/llm
        run: uv sync

      # Reconcile the DB against PredictorLLM.canonical_configs(): upsert every
      # canonical config + deactivate any other row. Runs on every deploy, so
      # adding/removing a config in code automatically syncs prod. DB creds come
      # from Secret Manager (same secret ids the services read from GSM).
      - name: Seed canonical configs
        working-directory: backend/apis/llm
        run: |
          export DB_HOST="$(gcloud secrets versions access latest --secret=DB_HOST)"
          export DB_PORT="$(gcloud secrets versions access latest --secret=DB_PORT)"
          export DB_NAME="$(gcloud secrets versions access latest --secret=DB_NAME)"
          export DB_USER="$(gcloud secrets versions access latest --secret=DB_USER)"
          export DB_PASSWORD="$(gcloud secrets versions access latest --secret=DB_PASSWORD)"
          PYTHONPATH=../../..:../../../backend uv run python -c "from src.classes.PredictorLLM import PredictorLLM; assert PredictorLLM.seed_canonical_configs(), 'seed failed'"
