name: Deploy

# Single workflow that enforces the deploy ordering:
#   cloud_run_deployer  →  queue_deployer  →  cron_deployer
#
# The ordering exists because:
#   • queue_deployer's `ServiceIamMember` bindings reference Cloud Run services
#     created by cloud_run_deployer.
#   • cron_deployer's `cloudrunv2.get_service_output(...)` looks up the
#     orchestrator service URL, which cloud_run_deployer creates.
#
# Every `pulumi up` is idempotent — if nothing in a stack changed, that job is
# a near-instant no-op. Fanning out per-component would let a partial deploy
# leave the system in a state where queues / crons point at non-existent
# services, so we keep them serial.

on:
  push:
    branches: [main]
    paths:
      - "backend/apis/**"
      - "backend/crons/**"
      - "backend/queues/**"
      - "backend/embedder/**"
      - "backend/qdrant/**"
      - "backend/supabase/**"
      - "backend/tasks/**"
      - "settings/**"
      - "backend/infra/cloud_run_deployer/**"
      - "backend/infra/cron_deployer/**"
      - "backend/infra/queue_deployer/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

concurrency:
  group: deploy-prd
  cancel-in-progress: false

jobs:
  cloud_run_deployer:
    name: Deploy Cloud Run services
    runs-on: ubuntu-latest
    environment: prd
    permissions:
      contents: read
      id-token: write
    env:
      PULUMI_BACKEND_URL: gs://prediction-market-llm-pulumi-state
      PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}
    steps:
      - uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS_JSON }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker europe-west3-docker.pkg.dev --quiet

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install deployer dependencies
        working-directory: backend/infra/cloud_run_deployer
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r requirements.txt

      - name: Install Pulumi CLI
        uses: pulumi/actions@v7

      - name: Pulumi up
        working-directory: backend/infra/cloud_run_deployer
        run: pulumi up --yes --refresh --stack prd

  queue_deployer:
    name: Deploy Cloud Tasks queues
    needs: cloud_run_deployer
    runs-on: ubuntu-latest
    environment: prd
    permissions:
      contents: read
      id-token: write
    env:
      PULUMI_BACKEND_URL: gs://prediction-market-llm-pulumi-state
      PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}
    steps:
      - uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS_JSON }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install deployer dependencies
        working-directory: backend/infra/queue_deployer
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r requirements.txt

      - name: Install Pulumi CLI
        uses: pulumi/actions@v7

      - name: Pulumi up
        working-directory: backend/infra/queue_deployer
        run: pulumi up --yes --refresh --stack prd

  cron_deployer:
    name: Deploy Cloud Scheduler crons
    needs: queue_deployer
    runs-on: ubuntu-latest
    environment: prd
    permissions:
      contents: read
      id-token: write
    env:
      PULUMI_BACKEND_URL: gs://prediction-market-llm-pulumi-state
      PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}
    steps:
      - uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS_JSON }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install deployer dependencies
        working-directory: backend/infra/cron_deployer
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r requirements.txt

      - name: Install Pulumi CLI
        uses: pulumi/actions@v7

      - name: Pulumi up
        working-directory: backend/infra/cron_deployer
        run: pulumi up --yes --refresh --stack prd
