name: Type Check

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ty-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          version: "latest"

      - name: Run ty type checker
        run: uv run --with ty ty check --ignore unresolved-import
